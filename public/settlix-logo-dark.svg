<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48" fill="none">
  <rect width="200" height="48" rx="8" fill="#0c0a09"/>
  <defs>
    <linearGradient id="gd" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#432dd7"/>
      <stop offset="100%" stop-color="#432dd7" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Icon (32x32), centered vertically in 48px: (48-32)/2 = 8 -->
