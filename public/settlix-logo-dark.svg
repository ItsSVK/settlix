    <path d="M16 6 Q 6 6 10 10" stroke="#fafaf9" stroke-width="6" stroke-linecap="round"/>
    <path d="M16 26 Q 26 26 22 22" stroke="#fafaf9" stroke-width="6" stroke-linecap="round"/>
    <path d="M6 26L26 6" stroke="url(#gd)" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Text "SettliX" with "i" in primary color -->
  <text x="50" y="32"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-weight="700"
    font-size="22"
    letter-spacing="-0.5"
    fill="#fafaf9">Settl<tspan fill="#432dd7">i</tspan>X</text>
</svg>
